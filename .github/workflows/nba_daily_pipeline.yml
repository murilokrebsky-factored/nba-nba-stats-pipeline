name: Daily NBA Data Pipeline

on:
  schedule:
    # Runs at 09:00 UTC (roughly 4:00 AM EST) every day
    - cron: '0 9 * * *'
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          pip install databricks-cli
          pip install dbt-databricks

      # STEP 1: Trigger the Python Ingestion Notebook in Databricks
      - name: Trigger Ingestion Notebook
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          DATABRICKS_JOB_ID: ${{ secrets.DATABRICKS_JOB_ID }}
        run: |
          echo "Triggering Databricks Job ID: $DATABRICKS_JOB_ID"
          # We pass the host and token directly to the command
          databricks jobs run-now --job-id $DATABRICKS_JOB_ID --host $DATABRICKS_HOST --token $DATABRICKS_TOKEN

      # STEP 2: Run dbt Transformations
      - name: Run dbt
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          # We tell dbt where to find the connection info
          dbt deps
          dbt seed --target prod
          dbt run --target prod
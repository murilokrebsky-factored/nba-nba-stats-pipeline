name: Daily NBA Data Pipeline

on:
  schedule:
    # Runs at 09:00 UTC (roughly 4:00 AM EST) every day
    - cron: '0 9 * * *'
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  pipeline:
    runs-on: ubuntu-latest
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
      DATABRICKS_HTTP_PATH: ${{ secrets.DATABRICKS_HTTP_PATH }}
      DATABRICKS_JOB_ID: ${{ secrets.DATABRICKS_JOB_ID }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          pip install databricks-cli
          pip install dbt-databricks

      # STEP 1: Trigger the Python Ingestion Notebook in Databricks
      - name: Trigger Ingestion Notebook
        run: |
          echo "Triggering Databricks Job via REST API..."
          curl --request POST \
            --url "${{ secrets.DATABRICKS_HOST }}/api/2.0/jobs/run-now" \
            --header "Authorization: Bearer ${{ secrets.DATABRICKS_TOKEN }}" \
            --header "Content-Type: application/json" \
            --data '{"job_id": ${{ secrets.DATABRICKS_JOB_ID }} }'

      # STEP 2: Run dbt Transformations
      - name: Run dbt
        run: |
          # We tell dbt where to find the connection info
          dbt deps
          dbt seed --target prod
          dbt run --target prod
sources:
  - name: nba_raw
    description: Raw NBA game ingested from ESPN Scoreboard API
    database: raw
    schema: nba_raw
    tables:
      - name: raw_nba_scoreboard
        config: 
          freshness:
            warn_after: {count: 24, period: hour}
            error_after: {count: 48, period: hour}

          loaded_at_field: ingested_at
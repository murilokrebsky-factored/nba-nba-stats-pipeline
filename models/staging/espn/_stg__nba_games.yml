models:
- name: stg_nba_games
  description: Cleaned NBA games data with deduplication
  columns:
    - name: game_id
      description: Primary key for the game
      data_tests:
        - unique
        - not_null
    - name: game_at
      description: Date of the game
      data_tests:
        - not_null
    - name: home_team
      description: Team playing at home
      data_tests:
        - not_null
    - name: home_score
      description: Score of the team playing at home
      data_tests:
        - dbt_utils.accepted_range:
            arguments:
              min_value: 0
              max_value: 200
        - not_null
    - name: away_team
      description: Team playing away
      data_tests:
        - not_null
    - name: away_score
      description: Score of the team playing away
      data_tests:
        - dbt_utils.accepted_range:
            arguments:
              min_value: 0
              max_value: 200
        - not_null
    - name: winner_name
      description: Winner team name
      data_tests:
        - not_null
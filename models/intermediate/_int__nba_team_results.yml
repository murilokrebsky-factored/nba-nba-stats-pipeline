models:
- name: int_nba_team_results
  description: >
      Intermediate table that unpivots game-level data into a team-level grain. 
      Each record represents a single team's performance within a specific game, 
      effectively doubling the row count of the source game data.
  columns:
    - name: game_id
      description: >
        The unique identifier of the original game. In this table, it is a
        grouping key used to link the two team records belonging to the same matchup.
      data_tests:
        - not_null
    - name: game_at
      description: Date of the game
      data_tests:
        - not_null
    - name: team_name
      description: Anchor team name
      data_tests:
        - not_null
    - name: opponent_name
      description: Opponent team name
      data_tests:
        - not_null
    - name: team_score
      description: Score of the anchor team
      data_tests:
        - dbt_utils.accepted_range:
            arguments:
              min_value: 0
              max_value: 200
        - not_null
    - name: opponent_score
      description: Score of the opponent team
      data_tests:
        - dbt_utils.accepted_range:
            arguments:
              min_value: 0
              max_value: 200
        - not_null
    - name: is_win
      description: Indicates whether or not the anchor team won
      data_tests:
        - accepted_values:
            arguments:
              values: [1, 0]
              quote: false
        - not_null
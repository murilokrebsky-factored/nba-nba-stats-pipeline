models:
- name: fct_nba_team_stats_timeline
  description: >
      A fact table providing a historical, game-by-game snapshot of NBA
      team standings. It calculates cumulative season performance, including
      home/away splits, divisional records, and win/loss streaks. This table
      is designed for building 'as-of-date' leaderboards and tracking team
      momentum throughout the season
  columns:
    - name: team_name
      description: Name of the anchor team
      data_tests:
        - not_null
    - name: conference
      description: Conference of the team
      data_tests:
        - not_null
        - accepted_values:
            arguments:
              values: ['West', 'East']
    - name: division
      description: Division of the team
      data_tests:
        - not_null
        - accepted_values:
            arguments:
              values: ['West', 'East']
    - name: team_name
      description: Anchor team name
      data_tests:
        - not_null
    - name: opponent_name
      description: Opponent team name
      data_tests:
        - not_null
    - name: team_score
      description: Score of the anchor team
      data_tests:
        - dbt_utils.accepted_range:
            arguments:
              min_value: 0
              max_value: 200
        - not_null
    - name: opponent_score
      description: Score of the opponent team
      data_tests:
        - dbt_utils.accepted_range:
            arguments:
              min_value: 0
              max_value: 200
        - not_null
    - name: is_win
      description: Indicates whether or not the anchor team won
      data_tests:
        - accepted_values:
            arguments:
              values: [1, 0]
              quote: false
        - not_null